<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrayFish Framework</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        
        header {
            background-color: #1a1a1a;
            color: white;
            padding: 2rem 0;
            text-align: center;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        
        section {
            margin-bottom: 3rem;
        }
        
        h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #1a1a1a;
        }
        
        p {
            margin-bottom: 1rem;
        }
        
        footer {
            background-color: #1a1a1a;
            color: white;
            text-align: center;
            padding: 2rem 0;
            margin-top: 3rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>CrayFish Framework</h1>
        <p>Low-Level Systems Library for Cross-Platform Development</p>
    </header>
    
    <main>
        <section>
            <h2>Welcome</h2>
            <p>CrayFish (libcrayfish) is a C-based systems library providing low-level abstractions for platform-specific operations.</p>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2026 int13 Labs. All rights reserved.</p>
    </footer>
</body>
</html>
